name: data-quality-env
version: "1.0.0"
description: >
  A real-world OpenEnv environment where an AI agent acts as a data quality analyst.
  The agent inspects tabular datasets and identifies data quality issues including
  missing values, type errors, duplicate rows, statistical outliers, and logical
  inconsistencies. Reward is shaped to provide partial progress signals at every step.

tags:
  - openenv
  - data-quality
  - real-world
  - tabular-data
  - nlp

tasks:
  - id: task1_missing_values
    difficulty: easy
    description: Find all missing (null) values in an employee records dataset.
    max_steps: 20
    reward_range: [0.0, 1.0]

  - id: task2_type_errors_duplicates
    difficulty: medium
    description: Identify type errors (wrong data types, invalid values) and duplicate rows.
    max_steps: 25
    reward_range: [0.0, 1.0]

  - id: task3_outliers_inconsistencies
    difficulty: hard
    description: Detect statistical outliers and logical inconsistencies in a world cities dataset.
    max_steps: 30
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  fields:
    task_id: string
    task_description: string
    dataset: array of row objects
    columns: array of column name strings
    step_number: integer
    issues_found_so_far: array of issue key strings
    hint: string

action_space:
  type: object
  fields:
    action_type:
      type: string
      enum: [flag_issue, fix_value, submit]
    task_id:
      type: string
    issue_type:
      type: string
      enum: [missing, type_error, duplicate, outlier, inconsistency]
    row_index:
      type: integer
    column:
      type: string

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  health: GET /health
  docs: GET /docs

docker:
  port: 7860
  health_check: GET /health